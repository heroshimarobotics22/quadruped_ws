controller_manager:
  ros__parameters:
    update_rate: 200

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    leg_controller:
      type: joint_trajectory_controller/JointTrajectoryController

leg_controller:
  ros__parameters:
    joints:
      - lf_hip
      - lf_thigh_joint
      - lf_foot_joint
      - rf_hip
      - rf_thigh_joint
      - rf_foot_joint
      - lr_hip
      - lr_thigh_joint
      - lr_foot_joint
      - rr_hip
      - rr_thigh_joint
      - rr_foot_joint

    command_interfaces:
      - position

    state_interfaces:
      - position

